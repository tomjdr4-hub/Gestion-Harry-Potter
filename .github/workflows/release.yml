name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip module
        run: |
          set -e
          # Crée un zip compatible Foundry : le contenu du zip doit être le dossier du module (celui qui contient module.json)
          mkdir -p dist
          zip -r dist/gestion-harry-potter.zip . -x "dist/*" 

      - name: Create GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gestion-harry-potter.zip

