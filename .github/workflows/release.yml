name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip module
        run: |
          set -e
          mkdir -p dist
          zip -r dist/gestion-harry-potter.zip . \
            -x "dist/*" -x ".git/*" -x ".github/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gestion-harry-potter.zip
